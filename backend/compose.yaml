services:
  db:
    image: "postgres:17-alpine"
    container_name: sliceit-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=sliceit_db
      - POSTGRES_USER=sliceit
      - POSTGRES_PASSWORD=sliceit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sliceit -d sliceit_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: sliceit-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sliceit_db
      - SPRING_DATASOURCE_USERNAME=sliceit
      - SPRING_DATASOURCE_PASSWORD=sliceit
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data: